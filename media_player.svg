<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- Outer yellow filmstrip body -->
  <rect x="1" y="3" width="30" height="26" fill="#ffff00"/>
  <!-- Top film perforations (black) -->
  <rect x="1" y="3" width="30" height="4" fill="#000000"/>
  <!-- Bottom film perforations (black) -->
  <rect x="1" y="25" width="30" height="4" fill="#000000"/>
  <!-- Top sprocket holes (yellow on black) -->
  <rect x="3"  y="4" width="3" height="2" fill="#ffff00"/>
  <rect x="8"  y="4" width="3" height="2" fill="#ffff00"/>
  <rect x="13" y="4" width="3" height="2" fill="#ffff00"/>
  <rect x="18" y="4" width="3" height="2" fill="#ffff00"/>
  <rect x="23" y="4" width="3" height="2" fill="#ffff00"/>
  <!-- Bottom sprocket holes -->
  <rect x="3"  y="26" width="3" height="2" fill="#ffff00"/>
  <rect x="8"  y="26" width="3" height="2" fill="#ffff00"/>
  <rect x="13" y="26" width="3" height="2" fill="#ffff00"/>
  <rect x="18" y="26" width="3" height="2" fill="#ffff00"/>
  <rect x="23" y="26" width="3" height="2" fill="#ffff00"/>
  <!-- Dark screen area -->
  <rect x="3" y="8" width="26" height="16" fill="#000080"/>
  <!-- Inner screen (black) -->
  <rect x="4" y="9" width="24" height="14" fill="#000000"/>
  <!-- Play triangle — red -->
  <polygon points="11,12 11,21 22,16.5" fill="#ff0000"/>
  <!-- Play triangle highlight (white tip) -->
  <polygon points="11,12 11,14 14,13" fill="#ffffff"/>
</svg>
